<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apuntes · Lumina</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- ====== SIDEBAR ====== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">Lumin<em>a</em></span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a href="../index.html" class="nav-item" data-page="dashboard">
        <span class="nav-item-icon">⊞</span> Dashboard
      </a>
      <div class="nav-section-label">Módulos</div>
      <a href="apuntes.html" class="nav-item" data-page="apuntes">
        <span class="nav-item-icon">📝</span> Apuntes
      </a>
      <a href="examenes.html" class="nav-item" data-page="examenes">
        <span class="nav-item-icon">📅</span> Exámenes
      </a>
      <a href="flashcards.html" class="nav-item" data-page="flashcards">
        <span class="nav-item-icon">🃏</span> Flashcards
      </a>
      <div class="nav-section-label">IA</div>
      <a href="../nueva-materia.html" class="nav-item" data-page="nueva-materia">
        <span class="nav-item-icon">✦</span> Nueva materia
      </a>
    </nav>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ====== PAGE WRAPPER ====== -->
  <div class="page-wrapper">

    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger">☰</button>
        <nav class="breadcrumb">
          <a href="../index.html" class="bc-item">Dashboard</a>
          <span class="bc-sep">/</span>
          <span class="bc-item active">Apuntes</span>
        </nav>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" onclick="toggleTheme()" title="Cambiar tema">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </header>

    <main class="page-content">

      <div class="page-header">
        <div class="page-header-info">
          <div class="page-title">Apuntes</div>
          <div class="page-subtitle">Material por materia</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="abrirModalMateria()">+ Nueva materia</button>
        </div>
      </div>

      <div class="apuntes-layout">

        <!-- Panel de Materias -->
        <aside class="materias-panel">
          <div class="materias-header">
            <h3>Materias</h3>
          </div>
          <div id="lista-materias"></div>
        </aside>

        <!-- Panel de Apuntes -->
        <div class="apuntes-main">
          <div class="apuntes-toolbar" id="apuntes-toolbar" style="display:none">
            <div class="search-box">
              <span>🔍</span>
              <input type="text" id="search-input" placeholder="Buscar en apuntes...">
            </div>
            <button class="btn btn-primary" onclick="abrirModalApunte()">+ Nuevo apunte</button>
          </div>

          <div id="apuntes-title" style="font-size:0.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;padding:2px 0"></div>

          <div id="apuntes-lista"></div>
        </div>

      </div>

    </main>
  </div>

  <!-- Modal: Nueva Materia -->
  <div class="modal-overlay" id="modal-materia">
    <div class="modal">
      <div class="modal-header">
        <h2>Nueva materia</h2>
        <button class="modal-close" onclick="cerrarModalMateria()">✕</button>
      </div>
      <form id="form-materia" onsubmit="event.preventDefault(); guardarMateria()">
        <div class="form-group">
          <label for="materia-nombre">Nombre</label>
          <input type="text" id="materia-nombre" placeholder="ej. Análisis Matemático" required autofocus>
        </div>
        <div class="form-group">
          <label>Color identificador</label>
          <div class="color-options">
            <div class="color-option selected" data-color="#6C63FF" style="background:#6C63FF"></div>
            <div class="color-option" data-color="#F6835A" style="background:#F6835A"></div>
            <div class="color-option" data-color="#38C9A0" style="background:#38C9A0"></div>
            <div class="color-option" data-color="#4A6CF7" style="background:#4A6CF7"></div>
            <div class="color-option" data-color="#F7B731" style="background:#F7B731"></div>
            <div class="color-option" data-color="#E84393" style="background:#E84393"></div>
            <div class="color-option" data-color="#26C0D3" style="background:#26C0D3"></div>
            <div class="color-option" data-color="#E53E3E" style="background:#E53E3E"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="cerrarModalMateria()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Crear materia</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Nuevo Apunte -->
  <div class="modal-overlay" id="modal-apunte">
    <div class="modal" style="max-width:540px">
      <div class="modal-header">
        <h2>Nuevo apunte</h2>
        <button class="modal-close" onclick="cerrarModalApunte()">✕</button>
      </div>
      <form id="form-apunte" onsubmit="event.preventDefault(); guardarApunte()">
        <div class="form-group">
          <label for="apunte-materia">Materia</label>
          <select id="apunte-materia"></select>
        </div>
        <div class="form-group">
          <label for="apunte-titulo">Título</label>
          <input type="text" id="apunte-titulo" placeholder="ej. Resumen Unidad 3 — Límites" required>
        </div>
        <div class="form-group">
          <label for="apunte-contenido">Contenido</label>
          <textarea id="apunte-contenido" rows="8" placeholder="Escribí o pegá tu apunte acá..." required></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="cerrarModalApunte()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar apunte</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/apuntes.js"></script>

</body>
</html>
